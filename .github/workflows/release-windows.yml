name: Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release Windows only accepts vX.Y.Z tags. Got ${{ github.ref_name }}"
          }

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Docs check
        run: npm run docs:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Security boundary check
        run: npm run security:check

      - name: Script syntax check
        run: |
          node --check server/proxy-server.mjs
          node --check server/ngrok-dev.mjs
          node --check server/runtime-env.mjs
          node --check scripts/sync-release-notes.mjs

      - name: Build and publish Windows release
        run: npm run publish:win
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Sync release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/sync-release-notes.mjs --tag "${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
