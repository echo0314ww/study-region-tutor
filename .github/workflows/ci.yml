name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Docs check
        run: npm run docs:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Security boundary check
        run: npm run security:check

      - name: Script syntax check
        run: |
          node --check server/proxy-server.mjs
          node --check server/ngrok-dev.mjs
          node --check server/runtime-env.mjs
          node --check scripts/sync-release-notes.mjs

      - name: Build
        run: npm run build
